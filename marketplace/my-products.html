<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Products — UYEH TECH</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
:root {
    --primary: #00ff88;
    --primary-dark: #00b359;
    --dark: #0a0a0a;
    --dark-light: #1a1a1a;
    --card-bg: #111;
    --white: #ffffff;
    --gray: #9ca3af;
    --gray-light: #d1d5db;
    --success: #00ff88;
    --error: #ff4444;
    --warning: #ffa500;
    --purple: #7b61ff;
    --glow: 0 0 20px rgba(0, 255, 136, 0.4);
    --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Montserrat', sans-serif; background: #0a0a0a; color: #fff; display: flex; min-height: 100vh; }

/* ── SIDEBAR ── */
.sidebar { width: 280px; background: linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%); border-right: 1px solid rgba(0,255,136,0.2); padding: 30px 0; position: fixed; height: 100vh; overflow-y: auto; z-index: 1000; transition: all 0.3s; }
.sidebar-logo { padding: 0 30px 30px; text-align: center; border-bottom: 1px solid rgba(0,255,136,0.2); }
.sidebar-logo-text { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: #00ff88; text-shadow: 0 0 20px rgba(0,255,136,0.4); }
.sidebar-menu { list-style: none; padding: 30px 15px; }
.menu-item { margin-bottom: 5px; }
.menu-link { display: flex; align-items: center; gap: 15px; padding: 15px 20px; color: #d1d5db; text-decoration: none; border-radius: 12px; transition: all 0.3s; font-weight: 500; }
.menu-link:hover, .menu-link.active { background: rgba(0,255,136,0.1); color: #00ff88; transform: translateX(5px); }
.menu-icon { font-size: 1.3rem; }
.sidebar-footer { padding: 20px 30px; border-top: 1px solid rgba(0,255,136,0.2); }
.logout-btn { width: 100%; padding: 12px; background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); border-radius: 10px; color: #ff4444; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Montserrat', sans-serif; }
.logout-btn:hover { background: rgba(255,68,68,0.2); }

/* ── MAIN ── */
.main-content { flex: 1; margin-left: 280px; padding: 40px; }
.page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 40px; gap: 20px; flex-wrap: wrap; }
.page-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; color: #00ff88; margin-bottom: 8px; }
.page-subtitle { color: #9ca3af; font-size: 1rem; }
.header-actions { display: flex; gap: 12px; }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,255,136,0.05)); border: 1px solid rgba(0,255,136,0.3); border-radius: 15px; padding: 22px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-card:hover { transform: translateY(-3px); box-shadow: 0 5px 20px rgba(0,255,136,0.3); }
.stat-icon { font-size: 2.2rem; }
.stat-label { color: #9ca3af; font-size: 0.85rem; margin-bottom: 4px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: #00ff88; }

/* ── FILTERS ── */
.filters-section { background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,255,136,0.03)); border: 1px solid rgba(0,255,136,0.25); border-radius: 15px; padding: 22px; margin-bottom: 28px; display: flex; gap: 18px; flex-wrap: wrap; align-items: flex-end; }
.filter-group { flex: 1; min-width: 180px; }
.filter-label { display: block; color: #00ff88; font-weight: 600; margin-bottom: 8px; font-size: 0.85rem; }
.filter-select, .search-input { width: 100%; padding: 11px 14px; background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.3); border-radius: 10px; color: #fff; font-family: 'Montserrat',sans-serif; font-size: 0.9rem; transition: all 0.3s; outline: none; }
.filter-select:focus, .search-input:focus { border-color: #00ff88; background: rgba(0,255,136,0.1); }
.search-input::placeholder { color: #6b7280; }
.filter-select option { background: #1a1a1a; }
.view-toggle { display: flex; gap: 8px; background: rgba(0,255,136,0.05); border-radius: 10px; padding: 5px; }
.view-btn { padding: 9px 16px; background: transparent; border: none; color: #9ca3af; font-size: 1.1rem; cursor: pointer; border-radius: 8px; transition: all 0.3s; }
.view-btn.active { background: rgba(0,255,136,0.2); color: #00ff88; }

/* ── BUTTONS ── */
.btn { padding: 11px 22px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Montserrat',sans-serif; font-size: 0.95rem; text-decoration: none; display: inline-flex; align-items: center; gap: 7px; }
.btn-primary { background: linear-gradient(135deg, #00b359, #00ff88); color: #0a0a0a; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
.btn-secondary { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
.btn-secondary:hover { background: rgba(0,255,136,0.2); }
.btn-purple { background: rgba(123,97,255,0.15); border: 1px solid rgba(123,97,255,0.4); color: #7b61ff; }
.btn-purple:hover { background: rgba(123,97,255,0.25); }
.btn-small { padding: 8px 14px; font-size: 0.85rem; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

/* ── MEDIA TYPE BADGE ── */
.media-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
.badge-video { background: rgba(255,68,68,0.15); border: 1px solid rgba(255,68,68,0.3); color: #ff6b6b; }
.badge-audio { background: rgba(123,97,255,0.15); border: 1px solid rgba(123,97,255,0.3); color: #7b61ff; }
.badge-file  { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
.badge-course { background: rgba(255,165,0,0.15); border: 1px solid rgba(255,165,0,0.3); color: #ffa500; }

/* ── PRODUCTS GRID ── */
.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px,1fr)); gap: 22px; }
.product-card { background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,255,136,0.03)); border: 1px solid rgba(0,255,136,0.25); border-radius: 16px; overflow: hidden; transition: all 0.3s; cursor: pointer; }
.product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,255,136,0.25); border-color: rgba(0,255,136,0.5); }
.product-image { width: 100%; height: 180px; background: linear-gradient(135deg, #00b359, #00ff88); display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; overflow: hidden; }
.product-image img { width: 100%; height: 100%; object-fit: cover; }
.product-image .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; font-size: 3rem; }
.product-card:hover .play-overlay { opacity: 1; }
.product-content { padding: 18px; }
.product-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.product-category { color: #9ca3af; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
.product-title { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1.3; }
.product-description { color: #9ca3af; font-size: 0.85rem; margin-bottom: 14px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.product-meta { display: flex; gap: 12px; flex-wrap: wrap; padding-top: 12px; border-top: 1px solid rgba(0,255,136,0.15); margin-bottom: 14px; }
.product-meta-item { display: flex; align-items: center; gap: 5px; color: #9ca3af; font-size: 0.8rem; }
.product-meta-value { color: #00ff88; font-weight: 600; }
.product-footer { display: flex; justify-content: space-between; align-items: center; }
.product-price { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #00ff88; font-weight: 900; }

/* ── LIST VIEW ── */
.products-list { display: flex; flex-direction: column; gap: 16px; }
.product-list-item { background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,255,136,0.03)); border: 1px solid rgba(0,255,136,0.25); border-radius: 14px; padding: 18px; display: flex; gap: 18px; align-items: center; transition: all 0.3s; cursor: pointer; }
.product-list-item:hover { transform: translateX(5px); box-shadow: 0 5px 20px rgba(0,255,136,0.25); }
.list-image { width: 90px; height: 90px; border-radius: 12px; background: linear-gradient(135deg, #00b359, #00ff88); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; overflow: hidden; }
.list-image img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
.list-content { flex: 1; }
.list-actions { display: flex; flex-direction: column; gap: 8px; }

/* ── EMPTY STATE ── */
.empty-state { text-align: center; padding: 80px 20px; background: rgba(0,255,136,0.04); border: 1px solid rgba(0,255,136,0.2); border-radius: 20px; }
.empty-icon { font-size: 5rem; margin-bottom: 18px; }
.empty-state h3 { font-family: 'Playfair Display', serif; color: #00ff88; font-size: 1.8rem; margin-bottom: 12px; }
.empty-state p { color: #9ca3af; margin-bottom: 28px; }

/* ── MODAL ── */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal.active { display: flex; }
.modal-content { background: linear-gradient(135deg, #111, #0a0a0a); border: 1px solid rgba(0,255,136,0.3); border-radius: 20px; max-width: 760px; width: 100%; max-height: 92vh; overflow-y: auto; animation: modalIn 0.3s ease; }
@keyframes modalIn { from { transform: translateY(-40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 24px 28px; border-bottom: 1px solid rgba(0,255,136,0.2); }
.modal-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #00ff88; }
.modal-close { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.3); color: #ff4444; width: 38px; height: 38px; border-radius: 50%; font-size: 1.3rem; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: rgba(255,68,68,0.2); }
.modal-body { padding: 28px; }

/* ── MEDIA PLAYER ── */
.media-player-container { width: 100%; border-radius: 14px; overflow: hidden; background: #000; margin-bottom: 22px; position: relative; }
.media-player-container iframe { width: 100%; aspect-ratio: 16/9; border: none; display: block; }
.media-player-container video,
.media-player-container audio { width: 100%; display: block; }
.media-player-container audio { padding: 20px; background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,255,136,0.05)); border-radius: 14px; }
.player-loading { display: flex; align-items: center; justify-content: center; aspect-ratio: 16/9; background: rgba(0,255,136,0.05); border-radius: 14px; border: 1px solid rgba(0,255,136,0.2); gap: 12px; color: #9ca3af; font-size: 0.9rem; }
.player-loading .spinner { width: 28px; height: 28px; border: 3px solid rgba(0,255,136,0.2); border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── COURSE CHAPTERS ── */
.course-sections { margin-top: 20px; }
.course-section-header { font-weight: 700; color: #fff; padding: 12px 0 8px; border-bottom: 1px solid rgba(0,255,136,0.15); margin-bottom: 8px; font-size: 0.95rem; }
.chapter-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: all 0.25s; margin-bottom: 4px; }
.chapter-item:hover { background: rgba(0,255,136,0.08); }
.chapter-item.active { background: rgba(0,255,136,0.12); border-left: 3px solid #00ff88; }
.chapter-num { width: 28px; height: 28px; background: rgba(0,255,136,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: #00ff88; flex-shrink: 0; }
.chapter-title { flex: 1; font-size: 0.9rem; color: #d1d5db; }
.chapter-duration { font-size: 0.78rem; color: #9ca3af; flex-shrink: 0; }
.free-chip { background: rgba(0,255,136,0.15); color: #00ff88; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

/* ── DETAIL ROWS ── */
.modal-section { margin-bottom: 24px; }
.modal-section-title { color: #00ff88; font-weight: 700; font-size: 1rem; margin-bottom: 12px; }
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,255,136,0.08); }
.detail-row:last-child { border-bottom: none; }
.detail-label { color: #9ca3af; font-size: 0.9rem; }
.detail-value { color: #fff; font-weight: 600; font-size: 0.9rem; }
.product-image-large { width: 100%; height: 220px; border-radius: 14px; background: linear-gradient(135deg, #00b359, #00ff88); display: flex; align-items: center; justify-content: center; font-size: 5rem; margin-bottom: 20px; overflow: hidden; }
.product-image-large img { width: 100%; height: 100%; object-fit: cover; }

/* ── ACTION BUTTONS AREA ── */
.action-area { margin-top: 24px; display: flex; gap: 12px; flex-wrap: wrap; }

/* ── LOADING ── */
.loading-state { text-align: center; padding: 60px 20px; }
.loading-spinner { width: 48px; height: 48px; border: 4px solid rgba(0,255,136,0.2); border-top-color: #00ff88; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
.loading-state p { color: #9ca3af; margin-top: 10px; }

/* ── MOBILE ── */
.mobile-menu-btn { display: none; position: fixed; top: 20px; left: 20px; width: 50px; height: 50px; background: linear-gradient(135deg, #00b359, #00ff88); border: none; border-radius: 12px; color: #0a0a0a; font-size: 1.5rem; cursor: pointer; z-index: 1001; box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
@media (max-width: 968px) {
    .sidebar { width: 0; padding: 0; overflow: hidden; }
    .sidebar.active { width: 280px; padding: 30px 0; }
    .main-content { margin-left: 0; padding: 80px 20px 20px; }
    .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
    .page-header { flex-direction: column; }
    .products-grid { grid-template-columns: 1fr; }
    .filters-section { flex-direction: column; }
    .product-list-item { flex-direction: column; text-align: center; }
    .list-actions { width: 100%; flex-direction: row; justify-content: center; }
    .action-area { flex-direction: column; }
    .action-area .btn { justify-content: center; }
}
    </style>
</head>
<body>

<button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="sidebar-logo-text">
            <img src="/marketplace/uyehtech logo.png" width="100" height="100" alt="UYEH TECH" onerror="this.style.display='none';this.parentElement.innerHTML='UYEH'">
        </div>
    </div>
    <ul class="sidebar-menu">
        <li class="menu-item"><a href="/marketplace/dashboard" class="menu-link"><span class="menu-icon">📊</span><span>Dashboard</span></a></li>
        <li class="menu-item"><a href="/marketplace/my-products" class="menu-link active"><span class="menu-icon">🛍️</span><span>My Products</span></a></li>
        <li class="menu-item"><a href="/marketplace/orders" class="menu-link"><span class="menu-icon">📋</span><span>Order History</span></a></li>
        <li class="menu-item"><a href="/marketplace/affiliate" class="menu-link"><span class="menu-icon">🔗</span><span>Affiliate</span></a></li>
        <li class="menu-item"><a href="/marketplace/settings" class="menu-link"><span class="menu-icon">⚙️</span><span>Settings</span></a></li>
        <li class="menu-item"><a href="/marketplace/" class="menu-link"><span class="menu-icon">🛒</span><span>Browse Store</span></a></li>
    </ul>
    <div class="sidebar-footer">
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </div>
</aside>

<main class="main-content">
    <div class="page-header">
        <div class="header-content">
            <h1 class="page-title">My Products</h1>
            <p class="page-subtitle">Your purchased digital products — videos, audio, files & courses</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📦</div>
            <div><div class="stat-label">Total Products</div><div class="stat-value" id="totalProducts">0</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div><div class="stat-label">Total Spent</div><div class="stat-value" id="totalSpent">$0</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">🎬</div>
            <div><div class="stat-label">Videos / Audio</div><div class="stat-value" id="totalMedia">0</div></div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div><div class="stat-label">Recent Purchase</div><div class="stat-value" style="font-size:1rem;" id="recentPurchase">—</div></div>
        </div>
    </div>

    <div class="filters-section">
        <div class="filter-group">
            <label class="filter-label">Category</label>
            <select class="filter-select" id="categoryFilter">
                <option value="all">All Categories</option>
                <option value="software">Software</option>
                <option value="courses">Courses</option>
                <option value="templates">Templates</option>
                <option value="music">Music / Audio</option>
                <option value="ebooks">E-Books</option>
                <option value="graphics">Graphics</option>
                <option value="other">Other</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="filter-label">Media Type</label>
            <select class="filter-select" id="mediaFilter">
                <option value="all">All Types</option>
                <option value="video">🎬 Video</option>
                <option value="audio">🎵 Audio</option>
                <option value="file">📁 File / Download</option>
                <option value="course">🎓 Course</option>
            </select>
        </div>
        <div class="filter-group">
            <label class="filter-label">Sort By</label>
            <select class="filter-select" id="sortFilter">
                <option value="newest">Newest First</option>
                <option value="oldest">Oldest First</option>
                <option value="price-high">Price: High to Low</option>
                <option value="price-low">Price: Low to High</option>
                <option value="name">Name: A–Z</option>
            </select>
        </div>
        <div class="filter-group">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search your products…">
        </div>
        <div class="view-toggle">
            <button class="view-btn active" data-view="grid" title="Grid View">⊞</button>
            <button class="view-btn" data-view="list" title="List View">☰</button>
        </div>
    </div>

    <div id="productsContainer" class="products-grid">
        <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Loading your products…</p>
        </div>
    </div>
</main>

<!-- ── PRODUCT MODAL ── -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="modalTitle">Product Details</h2>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// UYEH TECH — MY PRODUCTS PAGE  (Updated: External Media + Gated Access)
// ═══════════════════════════════════════════════════════════════════════

const API_URL = 'https://uyehtechbackend.onrender.com';

let allProducts    = [];
let filteredProducts = [];
let currentView    = 'grid';

// ── INIT ────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    if (!checkAuth()) return;
    initListeners();
    loadProducts();
});

function checkAuth() {
    const token = localStorage.getItem('token');
    const user  = localStorage.getItem('user');
    if (!token || !user) { window.location.href = '/marketplace/login'; return false; }
    try { JSON.parse(user); return true; }
    catch (_) { localStorage.removeItem('token'); localStorage.removeItem('user'); window.location.href = '/marketplace/login'; return false; }
}

// ── EVENT LISTENERS ─────────────────────────────────────────────────────
function initListeners() {
    document.getElementById('mobileMenuBtn').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('active'));
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('refreshBtn').addEventListener('click', () => { showNotification('🔄 Refreshing…', 'info'); loadProducts(); });
    document.getElementById('closeModal').addEventListener('click', closeModal);
    document.getElementById('categoryFilter').addEventListener('change', applyFilters);
    document.getElementById('mediaFilter').addEventListener('change', applyFilters);
    document.getElementById('sortFilter').addEventListener('change', applyFilters);
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentView = this.dataset.view;
            displayProducts();
        });
    });
    document.getElementById('productModal').addEventListener('click', e => { if (e.target.id === 'productModal') closeModal(); });
    document.addEventListener('click', e => {
        const sb = document.getElementById('sidebar'), mb = document.getElementById('mobileMenuBtn');
        if (window.innerWidth <= 968 && sb && mb && !sb.contains(e.target) && !mb.contains(e.target)) sb.classList.remove('active');
    });
    window.addEventListener('resize', () => { if (window.innerWidth > 968) document.getElementById('sidebar').classList.remove('active'); });
}

// ── LOAD PRODUCTS FROM SERVER ────────────────────────────────────────────
async function loadProducts() {
    const token = localStorage.getItem('token');
    setLoadingState();

    try {
        const res  = await fetch(`${API_URL}/api/orders`, { headers: { 'Authorization': `Bearer ${token}` } });
        const data = await res.json();

        if (!data.success || !data.orders) throw new Error(data.message || 'No orders returned');

        // ── Extract products from completed orders ──────────────────────
        const productMap = new Map(); // deduplicate by productId

        for (const order of data.orders) {
            if (order.status !== 'completed') continue;
            if (!order.items || !order.items.length) continue;

            for (const item of order.items) {
                const pid = item.id || item.productId || item._id;
                if (!pid) continue;

                // If we already have this product from an earlier order, skip
                if (productMap.has(pid)) continue;

                productMap.set(pid, {
                    productId:      pid,
                    title:          item.title         || 'Untitled Product',
                    description:    item.description   || '',
                    category:       item.category      || 'Digital Product',
                    price:          item.price         || 0,
                    image:          item.image         || item.icon || null,
                    // ── Media fields (server-provided, may be null for old orders) ──
                    mediaType:      item.mediaType     || null,   // 'video' | 'audio' | 'file' | null
                    embedType:      item.embedType     || null,   // 'youtube' | 'vimeo' | etc.
                    productType:    item.productType   || 'download',
                    fileSize:       item.fileSize      || null,
                    version:        item.version       || null,
                    // ── Order context ──
                    orderId:        order._id,
                    orderReference: order.orderReference,
                    purchaseDate:   order.createdAt    || order.updatedAt,
                    orderTotal:     order.total,
                });
            }
        }

        allProducts = Array.from(productMap.values());
        localStorage.setItem('user_products', JSON.stringify(allProducts));
        console.log(`✅ ${allProducts.length} unique products loaded`);

    } catch (err) {
        console.warn('⚠️ Server fetch failed, using cache:', err.message);
        showNotification('⚠️ Using cached data — some info may be outdated', 'info');
        allProducts = JSON.parse(localStorage.getItem('user_products') || '[]');
    }

    filteredProducts = [...allProducts];
    displayProducts();
    updateStats();
}

function setLoadingState() {
    const c = document.getElementById('productsContainer');
    c.className = '';
    c.innerHTML = `<div class="loading-state"><div class="loading-spinner"></div><p>Loading your products…</p></div>`;
}

// ── DISPLAY PRODUCTS ─────────────────────────────────────────────────────
function displayProducts() {
    const c = document.getElementById('productsContainer');

    if (filteredProducts.length === 0) {
        c.className = '';
        c.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">🛍️</div>
                <h3>No Products Yet</h3>
                <p>You haven't purchased any products that match this filter, or your library is empty.</p>
                <a href="/marketplace/" class="btn btn-primary">Browse Store</a>
            </div>`;
        return;
    }

    if (currentView === 'grid') {
        c.className = 'products-grid';
        c.innerHTML = filteredProducts.map(p => gridCard(p)).join('');
    } else {
        c.className = 'products-list';
        c.innerHTML = filteredProducts.map(p => listItem(p)).join('');
    }
}

function mediaBadge(p) {
    const t = p.mediaType || (p.productType === 'course' ? 'course' : 'file');
    const map = {
        video:  `<span class="media-badge badge-video">🎬 Video</span>`,
        audio:  `<span class="media-badge badge-audio">🎵 Audio</span>`,
        course: `<span class="media-badge badge-course">🎓 Course</span>`,
        file:   `<span class="media-badge badge-file">📁 File</span>`,
    };
    return map[t] || map.file;
}

function mediaActionBtn(p) {
    const t = p.mediaType || (p.productType === 'course' ? 'course' : 'file');
    if (t === 'video' || t === 'audio') {
        return `<button class="btn btn-primary btn-small" onclick="event.stopPropagation(); openMedia('${p.productId}','${p.orderId}')">▶ Play</button>`;
    }
    if (t === 'course') {
        return `<button class="btn btn-purple btn-small" onclick="event.stopPropagation(); openMedia('${p.productId}','${p.orderId}')">🎓 Start</button>`;
    }
    return `<button class="btn btn-primary btn-small" onclick="event.stopPropagation(); accessProduct('${p.productId}','${p.orderId}')">🔥 Download</button>`;
}

function gridCard(p) {
    const thumb = p.image ? `<img src="${p.image}" alt="${escHtml(p.title)}" onerror="this.style.display='none'">` : categoryEmoji(p);
    const hasMedia = p.mediaType === 'video' || p.mediaType === 'audio' || p.productType === 'course';
    return `
    <div class="product-card" onclick="viewProductDetails('${p.productId}','${p.orderId}')">
        <div class="product-image">
            ${thumb}
            ${hasMedia ? `<div class="play-overlay">▶</div>` : ''}
        </div>
        <div class="product-content">
            <div class="product-top">
                <div class="product-category">${escHtml(p.category)}</div>
                ${mediaBadge(p)}
            </div>
            <div class="product-title">${escHtml(p.title)}</div>
            <div class="product-description">${escHtml(p.description || 'Digital product')}</div>
            <div class="product-meta">
                <div class="product-meta-item"><span>📅</span><span class="product-meta-value">${ago(p.purchaseDate)}</span></div>
                <div class="product-meta-item"><span>🧾</span><span class="product-meta-value">${(p.orderReference||'').slice(0,12)}</span></div>
            </div>
            <div class="product-footer">
                <div class="product-price">$${parseFloat(p.price||0).toFixed(2)}</div>
                ${mediaActionBtn(p)}
            </div>
        </div>
    </div>`;
}

function listItem(p) {
    const thumb = p.image ? `<img src="${p.image}" alt="${escHtml(p.title)}" onerror="this.style.display='none'">` : categoryEmoji(p);
    return `
    <div class="product-list-item" onclick="viewProductDetails('${p.productId}','${p.orderId}')">
        <div class="list-image">${thumb}</div>
        <div class="list-content">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px;">
                <span style="color:#9ca3af;font-size:0.8rem;text-transform:uppercase;">${escHtml(p.category)}</span>
                ${mediaBadge(p)}
            </div>
            <div class="product-title">${escHtml(p.title)}</div>
            <div class="product-description">${escHtml(p.description||'Digital product')}</div>
            <div class="product-meta" style="border-top:none;padding-top:8px;margin-bottom:0;">
                <div class="product-meta-item"><span>📅</span><span class="product-meta-value">${ago(p.purchaseDate)}</span></div>
                <div class="product-meta-item"><span>💰</span><span class="product-meta-value">$${parseFloat(p.price||0).toFixed(2)}</span></div>
            </div>
        </div>
        <div class="list-actions">
            ${mediaActionBtn(p)}
            <button class="btn btn-secondary btn-small" onclick="event.stopPropagation(); viewProductDetails('${p.productId}','${p.orderId}')">📄 Details</button>
        </div>
    </div>`;
}

// ── STATS ────────────────────────────────────────────────────────────────
function updateStats() {
    const total  = allProducts.length;
    const spent  = allProducts.reduce((s, p) => s + parseFloat(p.price||0), 0);
    const media  = allProducts.filter(p => p.mediaType === 'video' || p.mediaType === 'audio' || p.productType === 'course').length;
    animVal('totalProducts', 0, total, 800);
    animVal('totalSpent', 0, spent, 800, '$');
    animVal('totalMedia', 0, media, 800);
    if (allProducts.length > 0) {
        const latest = [...allProducts].sort((a,b) => new Date(b.purchaseDate) - new Date(a.purchaseDate))[0];
        document.getElementById('recentPurchase').textContent = ago(latest.purchaseDate);
    }
}

function animVal(id, start, end, dur, prefix='') {
    const el = document.getElementById(id); if (!el) return;
    const step = (end - start) / (dur / 16);
    let cur = start;
    const t = setInterval(() => {
        cur += step;
        if (step > 0 && cur >= end || step < 0 && cur <= end) { cur = end; clearInterval(t); }
        el.textContent = prefix === '$' ? '$' + Math.floor(cur) : prefix + Math.floor(cur);
    }, 16);
}

// ── FILTERS ──────────────────────────────────────────────────────────────
function applyFilters() {
    const cat    = document.getElementById('categoryFilter').value;
    const media  = document.getElementById('mediaFilter').value;
    const sort   = document.getElementById('sortFilter').value;
    const q      = document.getElementById('searchInput').value.toLowerCase();

    filteredProducts = allProducts.filter(p => {
        if (cat !== 'all' && (p.category||'').toLowerCase() !== cat) return false;
        if (media !== 'all') {
            const mt = p.mediaType || (p.productType === 'course' ? 'course' : 'file');
            if (mt !== media) return false;
        }
        if (q) {
            if (!`${p.title} ${p.description||''} ${p.category||''}`.toLowerCase().includes(q)) return false;
        }
        return true;
    });

    filteredProducts.sort((a, b) => {
        if (sort === 'newest') return new Date(b.purchaseDate) - new Date(a.purchaseDate);
        if (sort === 'oldest') return new Date(a.purchaseDate) - new Date(b.purchaseDate);
        if (sort === 'price-high') return (b.price||0) - (a.price||0);
        if (sort === 'price-low') return (a.price||0) - (b.price||0);
        if (sort === 'name') return (a.title||'').localeCompare(b.title||'');
        return 0;
    });
    displayProducts();
}

// ═══════════════════════════════════════════════════════════════════════
// 🔒 GATED MEDIA ACCESS — hits /api/orders/:orderId/media-access
// ═══════════════════════════════════════════════════════════════════════

async function accessProduct(productId, orderId) {
    const token = localStorage.getItem('token');
    showNotification('🔐 Checking access…', 'info');
    try {
        const res  = await fetch(`${API_URL}/api/orders/${orderId}/media-access?productId=${productId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();

        if (!data.success) {
            showNotification(`❌ ${data.message || 'Access denied'}`, 'error');
            return null;
        }
        return data;

    } catch (err) {
        showNotification('❌ Could not reach server. Check your connection.', 'error');
        return null;
    }
}

async function openMedia(productId, orderId) {
    const data = await accessProduct(productId, orderId);
    if (!data) return;

    const p = allProducts.find(x => x.productId === productId);
    document.getElementById('modalTitle').textContent = p ? p.title : 'Product';

    const body = document.getElementById('modalBody');
    body.innerHTML = buildMediaPlayer(data, p);

    if (data.productType === 'course' && data.courseData?.sections?.length) {
        buildCourseChapters(data, body);
    }

    document.getElementById('productModal').classList.add('active');
}

function buildMediaPlayer(data, product) {
    let playerHTML = '';

    // ── iframe player (YouTube, Vimeo, Dailymotion, Google Drive) ──────
    if (data.playerType === 'iframe' && data.embedUrl) {
        playerHTML = `
        <div class="media-player-container">
            <div class="player-loading" id="playerLoader"><div class="spinner"></div>Loading player…</div>
            <iframe src="${escAttr(data.embedUrl)}"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen"
                    allowfullscreen
                    onload="document.getElementById('playerLoader').style.display='none'"
                    style="display:block;"></iframe>
        </div>`;
    }
    // ── SoundCloud widget ────────────────────────────────────────────────
    else if (data.playerType === 'soundcloud_widget' && data.embedUrl) {
        playerHTML = `
        <div class="media-player-container">
            <iframe width="100%" height="166" scrolling="no" frameborder="no"
                    src="${escAttr(data.embedUrl)}"></iframe>
        </div>`;
    }
    // ── HTML5 video ──────────────────────────────────────────────────────
    else if (data.playerType === 'html5_video' && data.embedUrl) {
        playerHTML = `
        <div class="media-player-container">
            <video controls style="width:100%;max-height:480px;background:#000;">
                <source src="${escAttr(data.embedUrl)}">
                Your browser doesn't support video playback.
            </video>
        </div>`;
    }
    // ── HTML5 audio ──────────────────────────────────────────────────────
    else if (data.playerType === 'html5_audio' && data.embedUrl) {
        playerHTML = `
        <div class="media-player-container">
            <audio controls style="width:100%;">
                <source src="${escAttr(data.embedUrl)}">
                Your browser doesn't support audio playback.
            </audio>
        </div>`;
    }
    // ── Cloudinary or plain file — show download button ─────────────────
    else if (data.downloadUrl) {
        playerHTML = `
        <div style="text-align:center;padding:30px 0;">
            <div style="font-size:4rem;margin-bottom:16px;">📥</div>
            <p style="color:#9ca3af;margin-bottom:20px;">Your file is ready to download.</p>
            <a href="${escAttr(data.downloadUrl)}" target="_blank" download class="btn btn-primary">
                🔥 Download File
            </a>
            ${data.expiresInSecs ? `<p style="color:#6b7280;font-size:0.78rem;margin-top:12px;">Link expires in ${Math.round(data.expiresInSecs/60)} minutes. Refresh if needed.</p>` : ''}
        </div>`;
    }

    // ── Product meta beneath player ──────────────────────────────────────
    const meta = product ? `
        <div class="modal-section" style="margin-top:20px;">
            <h3 class="modal-section-title">Purchase Information</h3>
            <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${escHtml(product.category||'Digital Product')}</span></div>
            <div class="detail-row"><span class="detail-label">Price Paid</span><span class="detail-value">$${parseFloat(product.price||0).toFixed(2)}</span></div>
            <div class="detail-row"><span class="detail-label">Purchased</span><span class="detail-value">${formatDate(product.purchaseDate)}</span></div>
            <div class="detail-row"><span class="detail-label">Order Ref</span><span class="detail-value">${escHtml(product.orderReference||'N/A')}</span></div>
            ${data.format ? `<div class="detail-row"><span class="detail-label">Format</span><span class="detail-value">${escHtml(data.format.toUpperCase())}</span></div>` : ''}
        </div>` : '';

    return playerHTML + meta;
}

function buildCourseChapters(data, body) {
    const sections = data.courseData.sections || [];
    let html = `<div class="modal-section"><h3 class="modal-section-title">📚 Course Content</h3><div class="course-sections">`;

    sections.forEach((sec, si) => {
        html += `<div class="course-section-header">Section ${si+1}: ${escHtml(sec.sectionTitle||'')}</div>`;
        (sec.chapters||[]).forEach((ch, ci) => {
            const dur = ch.duration ? fmtDur(ch.duration) : '';
            html += `
            <div class="chapter-item" onclick="loadChapter(this, '${escAttr(ch.embedUrl||'')}', '${ch.playerType||''}', '${escAttr(ch.cloudinaryUrl||'')}')">
                <div class="chapter-num">${ci+1}</div>
                <div class="chapter-title">${escHtml(ch.chapterTitle||`Chapter ${ci+1}`)}</div>
                ${ch.isFree ? `<span class="free-chip">FREE</span>` : ''}
                ${dur ? `<span class="chapter-duration">${dur}</span>` : ''}
            </div>`;
        });
    });

    html += `</div></div>`;
    body.innerHTML += html;
}

function loadChapter(el, embedUrl, playerType, cloudUrl) {
    document.querySelectorAll('.chapter-item').forEach(c => c.classList.remove('active'));
    el.classList.add('active');

    const src   = embedUrl || cloudUrl;
    const ptype = playerType || (cloudUrl ? 'html5_video' : 'iframe');
    const cont  = document.querySelector('.media-player-container');
    if (!cont || !src) return;

    if (ptype === 'iframe') {
        cont.innerHTML = `<iframe src="${escAttr(src)}" allow="autoplay; fullscreen" allowfullscreen style="width:100%;aspect-ratio:16/9;border:none;"></iframe>`;
    } else if (ptype === 'html5_video') {
        cont.innerHTML = `<video controls autoplay style="width:100%;max-height:480px;background:#000;"><source src="${escAttr(src)}"></video>`;
    }
}

// ── VIEW PRODUCT DETAILS (full modal for non-media or combined view) ──
async function viewProductDetails(productId, orderId) {
    const p = allProducts.find(x => x.productId === productId);
    if (!p) return;

    document.getElementById('modalTitle').textContent = p.title;

    const body = document.getElementById('modalBody');
    body.innerHTML = `
        <div class="product-image-large">
            ${p.image ? `<img src="${p.image}" alt="${escHtml(p.title)}">` : categoryEmoji(p)}
        </div>
        <div class="modal-section">
            <h3 class="modal-section-title">${escHtml(p.title)}</h3>
            <p style="color:#9ca3af;margin-bottom:16px;">${escHtml(p.description||'Digital product')}</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">${mediaBadge(p)}</div>
        </div>
        <div class="modal-section">
            <h3 class="modal-section-title">Purchase Information</h3>
            <div class="detail-row"><span class="detail-label">Category</span><span class="detail-value">${escHtml(p.category||'Digital Product')}</span></div>
            <div class="detail-row"><span class="detail-label">Price Paid</span><span class="detail-value">$${parseFloat(p.price||0).toFixed(2)}</span></div>
            <div class="detail-row"><span class="detail-label">Purchased</span><span class="detail-value">${formatDate(p.purchaseDate)}</span></div>
            <div class="detail-row"><span class="detail-label">Order Ref</span><span class="detail-value">${escHtml(p.orderReference||'N/A')}</span></div>
            ${p.fileSize ? `<div class="detail-row"><span class="detail-label">File Size</span><span class="detail-value">${escHtml(p.fileSize)}</span></div>` : ''}
            ${p.version  ? `<div class="detail-row"><span class="detail-label">Version</span><span class="detail-value">${escHtml(p.version)}</span></div>` : ''}
        </div>
        <div class="action-area" id="modalActions">
            <div class="player-loading" style="height:40px;border-radius:10px;padding:0 16px;"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div><span style="font-size:0.85rem;">Checking access…</span></div>
        </div>`;

    document.getElementById('productModal').classList.add('active');

    // Now hit the gated endpoint to get the real action button
    const data = await accessProduct(productId, orderId);
    const acts = document.getElementById('modalActions');
    if (!acts) return;

    if (!data) {
        acts.innerHTML = `<p style="color:#ff4444;font-size:0.9rem;">⚠️ Could not verify access. Try refreshing.</p>`;
        return;
    }

    const mt = p.mediaType || (p.productType === 'course' ? 'course' : 'file');

    if (mt === 'video' || mt === 'audio' || mt === 'course') {
        acts.innerHTML = `<button class="btn btn-primary" onclick="openMedia('${p.productId}','${p.orderId}')">▶ Play Now</button>`;
    } else if (data.downloadUrl) {
        acts.innerHTML = `<a href="${escAttr(data.downloadUrl)}" target="_blank" download class="btn btn-primary">🔥 Download Now</a>`;
    } else {
        acts.innerHTML = `<p style="color:#9ca3af;font-size:0.9rem;">⚠️ Content not yet configured. Contact support.</p>`;
    }
}

function closeModal() { document.getElementById('productModal').classList.remove('active'); }

// ── HELPERS ───────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) { return String(str||'').replace(/"/g,'&quot;'); }

function categoryEmoji(p) {
    const map = { software:'💻', courses:'🎓', templates:'🎨', music:'🎵', ebooks:'📚', graphics:'🖼️', video:'🎬', audio:'🎵' };
    const mt  = p.mediaType || (p.productType||'');
    return map[mt] || map[(p.category||'').toLowerCase()] || '📦';
}

function ago(dateStr) {
    if (!dateStr) return '—';
    const diff = Date.now() - new Date(dateStr).getTime();
    const d = Math.floor(diff / 86400000);
    if (d === 0) return 'Today';
    if (d === 1) return 'Yesterday';
    if (d < 7) return `${d}d ago`;
    if (d < 30) return `${Math.floor(d/7)}w ago`;
    return new Date(dateStr).toLocaleDateString('en-US', { month:'short', year:'numeric' });
}

function formatDate(ds) {
    if (!ds) return '—';
    return new Date(ds).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function fmtDur(secs) {
    const m = Math.floor(secs/60), s = secs%60;
    return `${m}:${String(s).padStart(2,'0')}`;
}

function logout() {
    if (confirm('Are you sure you want to logout?')) {
        ['token','user','user_products','user_orders'].forEach(k => localStorage.removeItem(k));
        showNotification('👋 Logged out', 'success');
        setTimeout(() => { window.location.href = '/marketplace/login'; }, 500);
    }
}

function showNotification(message, type='info') {
    const colors = { success:'linear-gradient(135deg,#00b359,#00ff88)', error:'linear-gradient(135deg,#ff4444,#ff6666)', info:'linear-gradient(135deg,#1a1a2e,#16213e)' };
    const n = document.createElement('div');
    n.style.cssText = `position:fixed;top:28px;right:28px;background:${colors[type]||colors.info};color:white;padding:16px 22px;border-radius:12px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,0.4);z-index:10001;max-width:380px;font-family:'Montserrat',sans-serif;border:1px solid rgba(255,255,255,0.1);animation:notifIn 0.3s ease;`;
    n.textContent = message;
    if (!document.getElementById('notifStyle')) {
        const s = document.createElement('style');
        s.id = 'notifStyle';
        s.textContent = '@keyframes notifIn{from{transform:translateX(400px);opacity:0}to{transform:translateX(0);opacity:1}}';
        document.head.appendChild(s);
    }
    document.body.appendChild(n);
    setTimeout(() => { n.style.opacity='0'; n.style.transform='translateX(400px)'; n.style.transition='all 0.3s ease'; setTimeout(() => n.remove(), 300); }, 4000);
}
