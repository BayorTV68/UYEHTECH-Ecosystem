<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Library — UYEH TECH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Bricolage+Grotesque:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --g:#00ff88;--g2:#00cc6a;--g3:rgba(0,255,136,.07);--g4:rgba(0,255,136,.13);--g5:rgba(0,255,136,.22);
  --bg:#07090a;--bg2:#0c0f0d;--bg3:#111510;--card:#0e1210;--card2:#131a14;
  --line:rgba(255,255,255,.06);--line2:rgba(255,255,255,.11);--line3:rgba(0,255,136,.18);
  --t1:#edf2ee;--t2:#9aab9e;--t3:#5a6b5d;
  --red:#ff4d4d;--amber:#f5a623;--blue:#5b9cf6;--purple:#a78bfa;--teal:#2dd4bf;
  --sw:268px;--hdr:60px;--r:12px;--r2:18px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--t1);display:flex;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,255,136,.15);border-radius:2px}

/* ── SIDEBAR ─────────────────────────────────────────────────────────── */
.sidebar{width:var(--sw);background:var(--bg2);border-right:1px solid var(--line);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:300;display:flex;flex-direction:column;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-brand{padding:22px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:11px;text-decoration:none;flex-shrink:0}
.sb-logo{width:38px;height:38px;background:linear-gradient(135deg,var(--g2),var(--g));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:.82rem;color:var(--bg);flex-shrink:0;letter-spacing:-.5px}
.sb-brand-name{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:1rem;color:var(--g);letter-spacing:.3px}
.sb-brand-sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);letter-spacing:.5px}
.sb-nav{flex:1;padding:16px 12px}
.sb-sec-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:2px;padding:14px 10px 6px}
.sb-link{display:flex;align-items:center;gap:10px;padding:9px 12px;color:var(--t2);text-decoration:none;border-radius:9px;font-weight:500;font-size:.875rem;margin-bottom:1px;transition:all .18s}
.sb-link:hover{background:var(--g3);color:var(--t1)}
.sb-link.active{background:var(--g4);color:var(--g);border:1px solid var(--line3)}
.sb-link i{width:17px;text-align:center;font-size:.9rem;flex-shrink:0}
.sb-footer{padding:14px 12px;border-top:1px solid var(--line);flex-shrink:0}
.logout-btn{width:100%;padding:9px 14px;background:rgba(255,77,77,.07);border:1px solid rgba(255,77,77,.18);border-radius:9px;color:var(--red);font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.875rem;transition:all .18s;display:flex;align-items:center;gap:8px;justify-content:center}
.logout-btn:hover{background:rgba(255,77,77,.14)}

/* ── LAYOUT ──────────────────────────────────────────────────────────── */
.main{flex:1;margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:200;height:var(--hdr);background:rgba(7,9,10,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:0 28px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.topbar-left{display:flex;align-items:center;gap:12px}
.menu-btn{display:none;background:none;border:none;color:var(--t1);font-size:1.15rem;cursor:pointer;padding:4px}
.page-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.1rem}
.page-sub{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--t3);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;padding:28px;max-width:1380px;width:100%}

/* ── BUTTONS ─────────────────────────────────────────────────────────── */
.btn{padding:8px 16px;border:none;border-radius:9px;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.85rem;display:inline-flex;align-items:center;gap:7px;transition:all .18s;text-decoration:none;white-space:nowrap;line-height:1}
.btn-sm{padding:6px 12px;font-size:.78rem}
.btn-ghost{background:transparent;border:1px solid var(--line2);color:var(--t2)}
.btn-ghost:hover{border-color:var(--line3);color:var(--g)}
.btn-primary{background:linear-gradient(135deg,var(--g2),var(--g));color:var(--bg);font-weight:700}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,255,136,.28)}
.btn-play  {background:rgba(255,77,77,.12);border:1px solid rgba(255,77,77,.25);color:#ff7070}
.btn-play:hover  {background:rgba(255,77,77,.2)}
.btn-listen{background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.25);color:var(--purple)}
.btn-listen:hover{background:rgba(167,139,250,.2)}
.btn-course{background:rgba(245,166,35,.12);border:1px solid rgba(245,166,35,.25);color:var(--amber)}
.btn-course:hover{background:rgba(245,166,35,.2)}

/* ── STAT TILES ──────────────────────────────────────────────────────── */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:18px;display:flex;align-items:center;gap:13px;transition:border-color .2s;position:relative;overflow:hidden}
.stat-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--g5),transparent);opacity:0;transition:opacity .2s}
.stat-tile:hover{border-color:var(--line3)}
.stat-tile:hover::before{opacity:1}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.si-g{background:rgba(0,255,136,.09);color:var(--g)}
.si-a{background:rgba(245,166,35,.09);color:var(--amber)}
.si-p{background:rgba(167,139,250,.09);color:var(--purple)}
.si-b{background:rgba(91,156,246,.09);color:var(--blue)}
.stat-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.stat-value{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.4rem;color:var(--t1);line-height:1}

/* ── TOOLBAR ─────────────────────────────────────────────────────────── */
.toolbar{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tb-search{flex:1;min-width:180px;position:relative}
.tb-search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:.8rem;pointer-events:none}
.search-inp{width:100%;padding:8px 12px 8px 33px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--t1);font-family:'Space Grotesk',sans-serif;font-size:.85rem;outline:none;transition:border-color .18s}
.search-inp::placeholder{color:var(--t3)}
.search-inp:focus{border-color:var(--line3)}
.tb-sep{width:1px;height:28px;background:var(--line);flex-shrink:0}
.filter-tabs{display:flex;gap:5px;flex-wrap:wrap}
.ftab{padding:5px 12px;border-radius:7px;border:1px solid var(--line);background:transparent;color:var(--t3);font-size:.78rem;font-weight:600;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .15s}
.ftab:hover{border-color:var(--line2);color:var(--t2)}
.ftab.active{background:var(--g4);border-color:var(--line3);color:var(--g)}
.tb-right{display:flex;gap:7px;align-items:center;margin-left:auto}
.sort-sel{padding:7px 11px;background:var(--bg3);border:1px solid var(--line);border-radius:8px;color:var(--t2);font-family:'Space Grotesk',sans-serif;font-size:.8rem;outline:none;cursor:pointer}
.sort-sel option{background:var(--bg2)}
.view-toggle{display:flex;background:var(--bg3);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.vbtn{width:32px;height:32px;border:none;background:transparent;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .15s}
.vbtn.active{background:var(--g4);color:var(--g)}

/* ── GRID / LIST ─────────────────────────────────────────────────────── */
.p-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px}
.p-list{display:flex;flex-direction:column;gap:10px}

/* ── PRODUCT CARD ────────────────────────────────────────────────────── */
.p-card{background:var(--card);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;transition:all .22s;display:flex;flex-direction:column;position:relative;cursor:pointer}
.p-card:hover{border-color:var(--line3);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.5)}
.p-card-thumb{position:relative;height:162px;overflow:hidden;flex-shrink:0;background:var(--bg3)}
.p-card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.p-card:hover .p-card-thumb img{transform:scale(1.04)}
.thumb-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.2rem}
.thumb-shine{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 55%);opacity:0;transition:opacity .22s}
.p-card:hover .thumb-shine{opacity:1}
.thumb-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);width:48px;height:48px;background:rgba(0,255,136,.88);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--bg);opacity:0;transition:all .22s}
.p-card:hover .thumb-play{opacity:1;transform:translate(-50%,-50%) scale(1)}
.thumb-badge{position:absolute;top:9px;left:9px}
.card-prog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.07)}
.card-prog-fill{height:100%;background:linear-gradient(90deg,var(--g2),var(--g));border-radius:0 2px 2px 0;transition:width .4s}
.card-prog-label{position:absolute;top:9px;right:9px;font-size:.62rem;background:rgba(0,0,0,.65);padding:2px 7px;border-radius:8px;font-family:'JetBrains Mono',monospace;color:var(--g)}
.p-card-body{padding:14px;flex:1;display:flex;flex-direction:column}
.p-card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.p-cat{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--g);text-transform:uppercase;letter-spacing:1px}
.p-date{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--t3)}
.p-card-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.95rem;color:var(--t1);margin-bottom:5px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-card-desc{font-size:.78rem;color:var(--t3);line-height:1.55;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:12px}
.p-card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto}
.p-price{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.05rem;color:var(--g)}

/* ── LIST ROW ────────────────────────────────────────────────────────── */
.p-row{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px 16px;display:flex;align-items:center;gap:13px;transition:all .18s;text-decoration:none;cursor:pointer}
.p-row:hover{border-color:var(--line3);background:var(--card2)}
.p-row-thumb{width:64px;height:64px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1.8rem;position:relative}
.p-row-thumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.row-prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:rgba(255,255,255,.07);border-radius:0 0 10px 10px}
.row-prog-fill{height:100%;background:var(--g)}
.p-row-body{flex:1;min-width:0}
.p-row-top{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.p-row-title{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:.9rem;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.p-row-sub{font-size:.77rem;color:var(--t3)}
.p-row-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0}

/* ── BADGES ──────────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:.63rem;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.3px;white-space:nowrap}
.badge-video  {background:rgba(255,77,77,.1);  border:1px solid rgba(255,77,77,.22);  color:#ff7070}
.badge-audio  {background:rgba(167,139,250,.1); border:1px solid rgba(167,139,250,.22);color:var(--purple)}
.badge-course {background:rgba(245,166,35,.1);  border:1px solid rgba(245,166,35,.22); color:var(--amber)}
.badge-soft   {background:rgba(91,156,246,.1);  border:1px solid rgba(91,156,246,.22); color:var(--blue)}
.badge-ebook  {background:rgba(45,212,191,.1);  border:1px solid rgba(45,212,191,.22); color:var(--teal)}
.badge-file   {background:rgba(0,255,136,.07);  border:1px solid rgba(0,255,136,.18);  color:var(--g)}

/* ── EMPTY / LOADING ─────────────────────────────────────────────────── */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:80px 20px;color:var(--t3)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:80px 20px;text-align:center}
.empty-icon{font-size:3.5rem;opacity:.35}
.empty-state h3{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.2rem;color:var(--t2)}
.empty-state p{font-size:.85rem;color:var(--t3);max-width:320px}
.spin{width:36px;height:36px;border:3px solid rgba(0,255,136,.15);border-top-color:var(--g);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── MOBILE ──────────────────────────────────────────────────────────── */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:250;backdrop-filter:blur(3px)}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .sb-overlay.active{display:block}
  .main{margin-left:0}
  .menu-btn{display:block}
  .stat-row{grid-template-columns:1fr 1fr}
  .content{padding:16px}
}
@media(max-width:540px){
  .stat-row{grid-template-columns:1fr 1fr}
}

/* ── TOAST ───────────────────────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:22px;right:22px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:11px;font-size:.83rem;font-weight:500;max-width:320px;animation:tin .25s ease;backdrop-filter:blur(14px)}
.t-success{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.22);color:var(--g)}
.t-error  {background:rgba(255,77,77,.1);border:1px solid rgba(255,77,77,.22);color:var(--red)}
.t-info   {background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--t1)}
@keyframes tin{from{transform:translateX(18px);opacity:0}to{transform:none;opacity:1}}
</style>
</head>
<body>

<div class="sb-overlay" id="sbOverlay"></div>

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <a href="/marketplace/" class="sb-brand">
    <div class="sb-logo">U/T</div>
    <div>
      <div class="sb-brand-name">UYEH TECH</div>
      <div class="sb-brand-sub">MARKETPLACE</div>
    </div>
  </a>
  <div class="sb-nav">
    <div class="sb-sec-label">Navigation</div>
    <a href="/marketplace/"            class="sb-link"><i class="fas fa-store"></i>Browse Store</a>
    <a href="/marketplace/my-products" class="sb-link active"><i class="fas fa-box-open"></i>My Library</a>
    <a href="/marketplace/orders"      class="sb-link"><i class="fas fa-receipt"></i>Order History</a>
    <a href="/marketplace/profile"     class="sb-link"><i class="fas fa-user-circle"></i>My Profile</a>
    <div class="sb-sec-label">Support</div>
    <a href="/marketplace/support"     class="sb-link"><i class="fas fa-headset"></i>Help & Support</a>
  </div>
  <div class="sb-footer">
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>Log Out</button>
  </div>
</nav>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
      <div>
        <div class="page-title">My Library</div>
        <div class="page-sub" id="pageSubtitle">Loading your products…</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-ghost btn-sm" id="refreshBtn"><i class="fas fa-rotate-right"></i>Refresh</button>
    </div>
  </div>

  <div class="content">

    <!-- STATS -->
    <div class="stat-row">
      <div class="stat-tile"><div class="stat-icon si-g"><i class="fas fa-box-open"></i></div><div><div class="stat-label">Total Products</div><div class="stat-value" id="stTotal">—</div></div></div>
      <div class="stat-tile"><div class="stat-icon si-a"><i class="fas fa-naira-sign"></i></div><div><div class="stat-label">Total Spent</div><div class="stat-value" id="stSpent">—</div></div></div>
      <div class="stat-tile"><div class="stat-icon si-p"><i class="fas fa-play-circle"></i></div><div><div class="stat-label">Media Items</div><div class="stat-value" id="stMedia">—</div></div></div>
      <div class="stat-tile"><div class="stat-icon si-b"><i class="fas fa-clock"></i></div><div><div class="stat-label">Last Purchase</div><div class="stat-value" id="stRecent" style="font-size:.9rem">—</div></div></div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
      <div class="tb-search">
        <i class="fas fa-search"></i>
        <input type="text" class="search-inp" id="searchInp" placeholder="Search your library…">
      </div>
      <div class="tb-sep"></div>
      <div class="filter-tabs" id="filterTabs">
        <button class="ftab active" data-f="all">All</button>
        <button class="ftab" data-f="course">🎓 Courses</button>
        <button class="ftab" data-f="video">🎬 Video</button>
        <button class="ftab" data-f="audio">🎵 Audio</button>
        <button class="ftab" data-f="software">💻 Software</button>
        <button class="ftab" data-f="ebook">📖 eBook</button>
        <button class="ftab" data-f="file">📁 Files</button>
      </div>
      <div class="tb-right">
        <select class="sort-sel" id="sortSel">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="name">A – Z</option>
          <option value="price-h">Price ↓</option>
          <option value="price-l">Price ↑</option>
          <option value="progress">Progress</option>
        </select>
        <div class="view-toggle">
          <button class="vbtn active" data-v="grid" title="Grid"><i class="fas fa-grip"></i></button>
          <button class="vbtn"        data-v="list" title="List"><i class="fas fa-list"></i></button>
        </div>
      </div>
    </div>

    <!-- PRODUCTS -->
    <div id="productsWrap">
      <div class="loading-state"><div class="spin"></div><p>Loading your library…</p></div>
    </div>

  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
'use strict';

/* ─────────────────────────────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────────────────────────────── */
const API         = 'https://uyehtechbackend.onrender.com';
const DETAIL_PAGE = '/marketplace/product-detail'; // the new product-detail.html page

/* ─────────────────────────────────────────────────────────────────────
   STATE
───────────────────────────────────────────────────────────────────── */
let allProducts  = [];
let filtered     = [];
let curView      = 'grid';
let activeFilter = 'all';
let progressMap  = {};   // productId → CourseProgress

/* ─────────────────────────────────────────────────────────────────────
   BOOTSTRAP
───────────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  bindUI();
  loadProducts();
});

/* ─────────────────────────────────────────────────────────────────────
   AUTH
───────────────────────────────────────────────────────────────────── */
function checkAuth() {
  const tk = ls('token'), usr = ls('user');
  if (!tk || !usr) { location.href = '/marketplace/login'; return false; }
  try { JSON.parse(usr); return true; }
  catch { ['token','user'].forEach(k => localStorage.removeItem(k)); location.href = '/marketplace/login'; return false; }
}
const ls      = k  => localStorage.getItem(k);
const token   = () => ls('token');
const authH   = () => ({ 'Authorization': `Bearer ${token()}`, 'Content-Type': 'application/json' });

/* ─────────────────────────────────────────────────────────────────────
   UI BINDINGS
───────────────────────────────────────────────────────────────────── */
function bindUI() {
  ge('menuBtn').onclick   = () => { ge('sidebar').classList.toggle('open'); ge('sbOverlay').classList.toggle('active'); };
  ge('sbOverlay').onclick = () => { ge('sidebar').classList.remove('open'); ge('sbOverlay').classList.remove('active'); };
  ge('logoutBtn').onclick = doLogout;
  ge('refreshBtn').onclick = () => { toast('Refreshing…', 'info'); loadProducts(); };
  ge('searchInp').addEventListener('input', applyFilters);
  ge('sortSel').addEventListener('change', applyFilters);
  ge('filterTabs').querySelectorAll('.ftab').forEach(btn => {
    btn.onclick = () => {
      ge('filterTabs').querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.f;
      applyFilters();
    };
  });
  document.querySelectorAll('.vbtn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.vbtn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curView = btn.dataset.v;
      render();
    };
  });
}

/* ─────────────────────────────────────────────────────────────────────
   LOAD PRODUCTS
───────────────────────────────────────────────────────────────────── */
async function loadProducts() {
  setLoading(true);
  try {
    const r = await fetch(`${API}/api/orders/my-products`, { headers: authH() });
    const d = await r.json();
    if (!d.success) throw new Error(d.message || 'Server error');
    allProducts = d.products || [];
    localStorage.setItem('_lib_cache', JSON.stringify(allProducts));
  } catch (err) {
    console.warn('Live fetch failed, using cache:', err.message);
    toast('Using cached data — refresh when online', 'info');
    allProducts = safeJSON(ls('_lib_cache'), []);
  }
  // Restore cached progress first (instant), then refresh in background
  progressMap = safeJSON(ls('_prog_cache'), {});
  filtered = [...allProducts];
  render();
  updateStats();
  fetchAllProgress();
}

function setLoading(on) {
  if (on) ge('productsWrap').innerHTML = `<div class="loading-state"><div class="spin"></div><p>Loading your library…</p></div>`;
}

/* ─────────────────────────────────────────────────────────────────────
   COURSE PROGRESS — batch background fetch
───────────────────────────────────────────────────────────────────── */
async function fetchAllProgress() {
  const courses = allProducts.filter(p => resolveType(p) === 'course');
  if (!courses.length) return;
  // batches of 4 to avoid hammering Render
  for (let i = 0; i < courses.length; i += 4) {
    await Promise.all(courses.slice(i, i + 4).map(async p => {
      try {
        const r = await fetch(
          `${API}/api/orders/${encodeURIComponent(String(p.orderId))}/course-progress?productId=${encodeURIComponent(String(p.productId))}`,
          { headers: authH() }
        );
        const d = await r.json();
        if (d.success && d.progress) progressMap[String(p.productId)] = d.progress;
      } catch (_) {}
    }));
  }
  localStorage.setItem('_prog_cache', JSON.stringify(progressMap));
  render(); // re-render to show fresh progress bars on cards
}

/* ─────────────────────────────────────────────────────────────────────
   STATS
───────────────────────────────────────────────────────────────────── */
function updateStats() {
  const total = allProducts.length;
  const spent = allProducts.reduce((s, p) => s + parseFloat(p.price || 0), 0);
  const media = allProducts.filter(p => ['video', 'audio', 'course'].includes(resolveType(p))).length;
  animNum('stTotal', total, '');
  animNum('stSpent', spent, '₦');
  animNum('stMedia', media, '');
  ge('pageSubtitle').textContent = `${total} product${total !== 1 ? 's' : ''} in your library`;
  if (allProducts.length) {
    const latest = [...allProducts].sort((a, b) => new Date(b.purchaseDate) - new Date(a.purchaseDate))[0];
    ge('stRecent').textContent = relTime(latest.purchaseDate);
  } else {
    ge('stRecent').textContent = '—';
  }
}

function animNum(id, end, prefix) {
  const el = ge(id); if (!el) return;
  let cur = 0; const step = end / 40;
  const t = setInterval(() => {
    cur = Math.min(cur + step, end);
    el.textContent = prefix === '₦'
      ? `₦${Math.floor(cur).toLocaleString()}`
      : Math.floor(cur);
    if (cur >= end) clearInterval(t);
  }, 16);
}

/* ─────────────────────────────────────────────────────────────────────
   TYPE RESOLVER
   Must match what media-access route and product-detail.html resolve
───────────────────────────────────────────────────────────────────── */
function resolveType(p) {
  if (p.mediaType === 'course' || p.productType === 'course' || p.hasCourse) return 'course';
  if (p.mediaType === 'video')  return 'video';
  if (p.mediaType === 'audio')  return 'audio';
  if (p.hasEmbed || p.embedType) return (p.embedType === 'soundcloud' || p.productType === 'music') ? 'audio' : 'video';
  if (p.productType === 'music')    return 'audio';
  if (p.productType === 'software') return 'software';
  if (p.productType === 'ebook')    return 'ebook';
  return 'file';
}

/* ─────────────────────────────────────────────────────────────────────
   FILTER + SORT
───────────────────────────────────────────────────────────────────── */
function applyFilters() {
  const q    = ge('searchInp').value.toLowerCase().trim();
  const sort = ge('sortSel').value;

  filtered = allProducts.filter(p => {
    const t = resolveType(p);
    if (activeFilter !== 'all') {
      if (activeFilter === 'file'     && !['file','ebook','template','script','component','download'].includes(t) && !['ebook','file','download','template','script','component'].includes(p.productType)) return false;
      if (activeFilter === 'video'    && t !== 'video')    return false;
      if (activeFilter === 'audio'    && t !== 'audio')    return false;
      if (activeFilter === 'course'   && t !== 'course')   return false;
      if (activeFilter === 'software' && t !== 'software') return false;
      if (activeFilter === 'ebook'    && t !== 'ebook')    return false;
    }
    if (q) {
      const haystack = `${p.title || ''} ${p.description || ''} ${p.category || ''}`.toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    if (sort === 'newest')  return new Date(b.purchaseDate) - new Date(a.purchaseDate);
    if (sort === 'oldest')  return new Date(a.purchaseDate) - new Date(b.purchaseDate);
    if (sort === 'name')    return (a.title || '').localeCompare(b.title || '');
    if (sort === 'price-h') return (b.price || 0) - (a.price || 0);
    if (sort === 'price-l') return (a.price || 0) - (b.price || 0);
    if (sort === 'progress') {
      const pa = progressMap[String(a.productId)]?.completionPct || 0;
      const pb = progressMap[String(b.productId)]?.completionPct || 0;
      return pb - pa;
    }
    return 0;
  });

  render();
}

/* ─────────────────────────────────────────────────────────────────────
   RENDER
───────────────────────────────────────────────────────────────────── */
function render() {
  const w = ge('productsWrap');
  if (!filtered.length && !allProducts.length) {
    w.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📦</div>
      <h3>Your library is empty</h3>
      <p>Purchase products from the store to access them here.</p>
      <a href="/marketplace/" class="btn btn-primary" style="margin-top:8px">Browse Store</a>
    </div>`; return;
  }
  if (!filtered.length) {
    w.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <h3>No matches</h3>
      <p>Try a different search term or filter.</p>
    </div>`; return;
  }
  w.innerHTML = curView === 'grid'
    ? `<div class="p-grid">${filtered.map(cardHTML).join('')}</div>`
    : `<div class="p-list">${filtered.map(rowHTML).join('')}</div>`;
}

/* ─────────────────────────────────────────────────────────────────────
   NAVIGATE TO DETAIL PAGE
   All products go to product-detail.html — no more modals
───────────────────────────────────────────────────────────────────── */
function openProduct(productId, orderId) {
  const pid = encodeURIComponent(String(productId));
  const oid = encodeURIComponent(String(orderId));
  location.href = `${DETAIL_PAGE}?productId=${pid}&orderId=${oid}`;
}

function detailUrl(p) {
  return `${DETAIL_PAGE}?productId=${encodeURIComponent(String(p.productId))}&orderId=${encodeURIComponent(String(p.orderId))}`;
}

/* ─────────────────────────────────────────────────────────────────────
   BADGE HTML
───────────────────────────────────────────────────────────────────── */
const BADGE_CFG = {
  video:    ['badge-video',  '▶ Video'],
  audio:    ['badge-audio',  '♫ Audio'],
  course:   ['badge-course', '🎓 Course'],
  software: ['badge-soft',   '💻 Software'],
  ebook:    ['badge-ebook',  '📖 eBook'],
  file:     ['badge-file',   '↧ File'],
};
function badge(p) {
  const t = resolveType(p);
  const [cls, lbl] = BADGE_CFG[t] || BADGE_CFG.file;
  return `<span class="badge ${cls}">${lbl}</span>`;
}

/* ─────────────────────────────────────────────────────────────────────
   ACTION BUTTON
───────────────────────────────────────────────────────────────────── */
const ACTION_CFG = {
  video:    ['btn-play',    'fa-play',        'Watch'],
  audio:    ['btn-listen',  'fa-headphones',  'Listen'],
  course:   ['btn-course',  'fa-play-circle', 'Open Course'],
  software: ['btn-primary', 'fa-download',    'Get Key'],
  ebook:    ['btn-primary', 'fa-book-open',   'Read'],
  file:     ['btn-primary', 'fa-download',    'Download'],
};
function actionBtn(p, sm) {
  const t = resolveType(p);
  const [cls, icon, lbl] = ACTION_CFG[t] || ACTION_CFG.file;
  return `<a class="btn ${cls} ${sm ? 'btn-sm' : ''}" href="${detailUrl(p)}"
    onclick="event.stopPropagation()"><i class="fas ${icon}"></i>${lbl}</a>`;
}

/* ─────────────────────────────────────────────────────────────────────
   COURSE PROGRESS UI HELPERS
───────────────────────────────────────────────────────────────────── */
function getProgress(p) {
  return progressMap[String(p.productId)] || null;
}
function cardProgBar(p) {
  if (resolveType(p) !== 'course') return '';
  const prog = getProgress(p);
  const pct  = prog?.completionPct || 0;
  const cert = prog?.certificateIssued;
  return `
    <div class="card-prog"><div class="card-prog-fill" style="width:${pct}%"></div></div>
    ${cert
      ? `<div class="card-prog-label">🎓 Complete</div>`
      : pct > 0
        ? `<div class="card-prog-label">${pct}%</div>`
        : ''}`;
}
function rowProgBar(p) {
  if (resolveType(p) !== 'course') return '';
  const pct = getProgress(p)?.completionPct || 0;
  return `<div class="row-prog"><div class="row-prog-fill" style="width:${pct}%"></div></div>`;
}
function rowProgLabel(p) {
  if (resolveType(p) !== 'course') return '';
  const prog = getProgress(p);
  if (!prog) return '';
  if (prog.certificateIssued) return `<span style="font-size:.65rem;color:var(--g)">🎓 Complete</span>`;
  if (prog.completionPct > 0) return `<span style="font-family:'JetBrains Mono',monospace;font-size:.68rem;color:var(--t3)">${prog.completionPct}%</span>`;
  return '';
}

/* ─────────────────────────────────────────────────────────────────────
   THUMB EMOJI
───────────────────────────────────────────────────────────────────── */
const EMOJIS = { video:'🎬', audio:'🎵', course:'🎓', software:'💻', ebook:'📖', file:'📦' };
function thumbEmoji(p) { return EMOJIS[resolveType(p)] || '📦'; }

/* ─────────────────────────────────────────────────────────────────────
   CARD HTML
───────────────────────────────────────────────────────────────────── */
function cardHTML(p) {
  const t    = resolveType(p);
  const url  = detailUrl(p);
  const img  = esc(p.image || '');
  const hasMedia = ['video', 'audio', 'course'].includes(t);
  const playSymbol = t === 'audio' ? '♫' : '▶';

  const courseStats = (t === 'course' && p.coursePreview) ? `
    <div style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap">
      ${p.coursePreview.totalChapters ? `<span style="font-size:.7rem;color:var(--t3)"><i class="fas fa-play-circle" style="color:var(--amber);margin-right:3px"></i>${p.coursePreview.totalChapters} chapters</span>` : ''}
      ${p.coursePreview.totalDuration ? `<span style="font-size:.7rem;color:var(--t3)"><i class="fas fa-clock" style="color:var(--amber);margin-right:3px"></i>${fmtDur(p.coursePreview.totalDuration)}</span>` : ''}
      ${p.coursePreview.level         ? `<span style="font-size:.7rem;color:var(--t3);text-transform:capitalize">${p.coursePreview.level}</span>` : ''}
      ${p.coursePreview.certificate   ? `<span style="font-size:.7rem;color:var(--g)">🎓 Cert</span>` : ''}
    </div>` : '';

  return `
  <div class="p-card" onclick="location.href='${url}'" role="link" tabindex="0"
       onkeydown="if(event.key==='Enter')location.href='${url}'">
    <div class="p-card-thumb">
      ${img
        ? `<img src="${img}" alt="${esc(p.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
           <div class="thumb-fallback" style="display:none">${thumbEmoji(p)}</div>`
        : `<div class="thumb-fallback">${thumbEmoji(p)}</div>`}
      <div class="thumb-shine"></div>
      ${hasMedia ? `<div class="thumb-play">${playSymbol}</div>` : ''}
      <div class="thumb-badge">${badge(p)}</div>
      ${cardProgBar(p)}
    </div>
    <div class="p-card-body">
      <div class="p-card-meta">
        <span class="p-cat">${esc(p.category || 'Digital')}</span>
        <span class="p-date">${relTime(p.purchaseDate)}</span>
      </div>
      <div class="p-card-title">${esc(p.title)}</div>
      ${courseStats}
      <div class="p-card-desc">${esc(p.description || '')}</div>
      <div class="p-card-footer">
        <span class="p-price">₦${Number(p.price || 0).toLocaleString()}</span>
        ${actionBtn(p, true)}
      </div>
    </div>
  </div>`;
}

/* ─────────────────────────────────────────────────────────────────────
   ROW HTML
───────────────────────────────────────────────────────────────────── */
function rowHTML(p) {
  const img = esc(p.image || '');
  const url = detailUrl(p);
  const t   = resolveType(p);
  return `
  <a class="p-row" href="${url}">
    <div class="p-row-thumb">
      ${img ? `<img src="${img}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
      <span>${thumbEmoji(p)}</span>
      ${rowProgBar(p)}
    </div>
    <div class="p-row-body">
      <div class="p-row-top">${badge(p)}<span class="p-cat">${esc(p.category || 'Digital')}</span>${rowProgLabel(p)}</div>
      <div class="p-row-title">${esc(p.title)}</div>
      <div class="p-row-sub">
        ${p.coursePreview?.totalChapters ? `${p.coursePreview.totalChapters} chapters · ` : ''}
        ${p.coursePreview?.totalDuration ? `${fmtDur(p.coursePreview.totalDuration)} · ` : ''}
        ${esc(p.description || '')}
      </div>
    </div>
    <div class="p-row-right">
      <span class="p-price">₦${Number(p.price || 0).toLocaleString()}</span>
      ${actionBtn(p, true)}
    </div>
  </a>`;
}

/* ─────────────────────────────────────────────────────────────────────
   HELPERS
───────────────────────────────────────────────────────────────────── */
function ge(id)        { return document.getElementById(id); }
function esc(s)        { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function safeJSON(s,f) { try { return JSON.parse(s) || f; } catch { return f; } }

function relTime(d) {
  if (!d) return '—';
  const days = Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  if (days < 7)   return `${days}d ago`;
  if (days < 30)  return `${Math.floor(days / 7)}w ago`;
  return new Date(d).toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
}

function fmtDur(s) {
  if (!s) return '';
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
  return h ? `${h}h ${m}m` : `${m}m`;
}

function toast(msg, type = 'info') {
  const icons = { success: 'fa-check', error: 'fa-times', info: 'fa-info-circle' };
  const el = document.createElement('div');
  el.className = `toast t-${type}`;
  el.innerHTML = `<i class="fas ${icons[type] || icons.info}"></i><span>${esc(msg)}</span>`;
  ge('toastWrap').appendChild(el);
  setTimeout(() => {
    el.style.cssText = 'opacity:0;transform:translateX(30px);transition:all .28s';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

function doLogout() {
  if (!confirm('Log out of UYEH TECH?')) return;
  ['token', 'user', '_lib_cache', '_prog_cache'].forEach(k => localStorage.removeItem(k));
  location.href = '/marketplace/login';
}
</script>
